name: Sync LeetCode Submissions

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED SETUP (one-time, in your GitHub repo):
#
# Settings → Secrets and variables → Actions
#
#   SECRETS tab — add these two (encrypted):
#     LEETCODE_SESSION  ← value of the LEETCODE_SESSION cookie
#     LEETCODE_CSRF     ← value of the csrftoken cookie
#
#   VARIABLES tab — add this one (plain text, not encrypted):
#     LEETCODE_USERNAME ← your LeetCode username  e.g. "suryansh123"
#
#   NOTE: If you accidentally added LEETCODE_USERNAME as a Secret instead of
#   a Variable, this workflow will still find it — both are checked.
#
# How to get your cookies:
#   1. Log into leetcode.com
#   2. DevTools → Application (Chrome) / Storage (Firefox)
#   3. Cookies → https://leetcode.com
#   4. Copy the VALUE of LEETCODE_SESSION and csrftoken
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 */4 * * *'          # every 4 hours

  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Paginate through ALL submissions (use for first run or full resync)'
        type: boolean
        required: false
        default: false
      limit:
        description: 'Recent submissions to fetch (ignored when full_sync=true)'
        required: false
        default: '50'

jobs:
  sync:
    name: Fetch & Commit New Solutions
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Pre-flight: validate all required config is present ───────────────
      - name: Validate configuration
        env:
          LEETCODE_SESSION:  ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF:     ${{ secrets.LEETCODE_CSRF }}
          # Accept username from Variable OR Secret (Variable takes precedence)
          USERNAME_FROM_VAR: ${{ vars.LEETCODE_USERNAME }}
          USERNAME_FROM_SEC: ${{ secrets.LEETCODE_USERNAME }}
        run: |
          MISSING=()
          [ -z "$LEETCODE_SESSION" ]  && MISSING+=("LEETCODE_SESSION (Secret)")
          [ -z "$LEETCODE_CSRF" ]     && MISSING+=("LEETCODE_CSRF (Secret)")

          # Resolve username — try Variable first, fall back to Secret
          RESOLVED_USERNAME="${USERNAME_FROM_VAR:-$USERNAME_FROM_SEC}"
          [ -z "$RESOLVED_USERNAME" ] && MISSING+=("LEETCODE_USERNAME (Variable or Secret)")

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required configuration:"
            for item in "${MISSING[@]}"; do
              echo "::error::  → $item"
            done
            echo ""
            echo "Go to: Settings → Secrets and variables → Actions"
            exit 1
          fi

          echo "✓ All credentials present"
          echo "✓ Username resolved (length: ${#RESOLVED_USERNAME})"
          # Persist the resolved username for the next step
          echo "LEETCODE_USERNAME=$RESOLVED_USERNAME" >> $GITHUB_ENV

      # ── Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install scraper dependencies
        run: pip install -r scraper/requirements.txt

      # ── Run scraper ───────────────────────────────────────────────────────
      - name: Run LeetCode scraper
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF:    ${{ secrets.LEETCODE_CSRF }}
          # LEETCODE_USERNAME is set in $GITHUB_ENV by the validate step above
        run: |
          if [ "${{ github.event.inputs.full_sync }}" = "true" ]; then
            echo "Mode: FULL SYNC (paginating all submissions)"
            python scraper/main.py \
              --username "$LEETCODE_USERNAME" \
              --all
          else
            echo "Mode: RECENT (last ${{ github.event.inputs.limit || '50' }} submissions)"
            python scraper/main.py \
              --username "$LEETCODE_USERNAME" \
              --limit    "${{ github.event.inputs.limit || '50' }}"
          fi

      # ── Commit changes (tracked + untracked new files) ────────────────────
      - name: Check for changes in data/
        id: changes
        run: |
          # git diff only sees tracked files; git status --porcelain also catches
          # new untracked files (e.g. freshly created data/problems/*.md)
          if [ -n "$(git status --porcelain data/)" ]; then
            echo "changed=true"  >> $GITHUB_OUTPUT
            echo "Summary of changes:"
            git status --short data/
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push new solutions
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore(sync): add new LeetCode solutions [skip ci]

          Automated sync via GitHub Actions at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push

      - name: No new solutions found
        if: steps.changes.outputs.changed == 'false'
        run: echo "✓ No new submissions since last sync — nothing to commit."
